            <img src="assets/images/contact-hero-v1.png" class="contact-hero-v1" alt="">

                <div class="breadcrumb">

                    <svg width="17" height="17" viewBox="0 0 17 17" fill="none" xmlns="http://www.w3.org/2000/svg">

                    <span>
                        お問い合わせ
                    </span>
                </div>
                <h2>
                    お問い合わせ
                </h2>
                <p>
                    お子さまの発達や支援について、
                    <br>
                    気になることや不安なことがございましたら
                    <br>
                    お気軽にご相談ください。
                </p>
            </div>
            <div class="hero-banner">
                <img src="assets/images/contact-hero.png" alt="">
            </div>
        </section>
        <section class="contact-form-section">
            <div class="md-container">
                <div class="form-card">
                    <!-- お名前 -->
                    <div class="form-group">
                        <div class="title">お名前<span>※</span></div>
                        <div class="input">
                            <input type="text" class="form-control" placeholder="例）山田 太郎">
                        </div>
                    </div>

                    <!-- ふりがな -->
                    <div class="form-group">
                        <div class="title">ふりがな<span>※</span></div>
                        <div class="input">
                            <input type="text" class="form-control" placeholder="例）やまだ たろう">
                        </div>
                    </div>

                    <!-- 電話番号 -->
                    <div class="form-group">
                        <div class="title">電話番号<span>※</span></div>
                        <div class="input">
                            <input type="tel" class="form-control" placeholder="例）090-1234-5678">
                        </div>
                    </div>

                    <!-- メールアドレス -->
                    <div class="form-group">
                        <div class="title">メールアドレス<span>※</span></div>
                        <div class="input">
                            <input type="email" class="form-control" placeholder="例）example@mail.com">
                        </div>
                    </div>

                    <!-- お子さまの年齢 -->
                    <div class="form-group">
                        <div class="title">お子さまの年齢</div>
                        <div class="input">
                            <select class="form-control">
                                <option value="" disabled selected>選択してください</option>
                                <option value="0">0歳</option>
                                <option value="1">1歳</option>
                                <option value="2">2歳</option>
                                <option value="3">3歳</option>
                                <option value="4">4歳</option>
                                <option value="5">5歳</option>
                                <option value="6">6歳</option>
                            </select>
                        </div>
                    </div>

                    <!-- お問い合わせ種別 -->
                    <div class="form-group">
                        <div class="title">お問い合わせ種別</div>
                        <div class="checkbox-group">
                            <label><input class="check-box" type="checkbox" value="見学希望"> 見学希望</label>
                            <label><input class="check-box" type="checkbox" value="体験利用希望"> 体験利用希望</label>
                            <label><input class="check-box" type="checkbox" value="サービスについて"> サービスについて</label>
                            <label><input class="check-box" type="checkbox" value="空き状況"> 空き状況</label>
                            <label><input class="check-box" type="checkbox" value="その他"> その他</label>
                        </div>
                    </div>

                    <!-- お問い合わせ内容 -->
                    <div class="form-group">
                        <div class="title">お問い合わせ内容<span>※</span></div>
                        <div class="input">
                            <textarea class="form-control" rows="8" placeholder="ご質問・ご相談内容をご入力ください"></textarea>
                        </div>
                    </div>

                    <!-- 個人情報保護方針 -->
                    <div class="form-group">
                        <div class="title">個人情報保護方針</div>
                        <div class="input">
                            <div class="checkbox-group">
                                <label><input class="check-box" type="checkbox" value="同意する"> 同意する</label>
                            </div>
                            <div class="privacy-label">
